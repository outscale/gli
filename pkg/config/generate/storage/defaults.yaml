contents:
  ListBuckets:
    content: Buckets
    entity: bucket
    group: Bucket
  ListObjectsV2:
    content: Contents
    entity: object
    group: Object
  ListObjectVersions:
    content: Versions
    entity: objectversion
    group: Object
  GetObject:
    entity: objectmetadata
    group: Object
  GetBucketAcl:
    content: .
    entity: acl
    group: Bucket
  GetBucketCors:
    entity: cors
    group: Bucket
  GetBucketEncryption:
    entity: encryption
    group: Bucket
  GetBucketVersioning:
    entity: versioning
    group: Bucket
  GetBucketLocation:
    entity: location
    group: Bucket
  GetBucketPolicy:
    entity: policy
    group: Bucket
    content: Policy
  GetBucketLifecycleConfiguration:
    entity: lifecycle
    group: Bucket
  GetBucketWebsite:
    entity: website
    group: Bucket
  PutBucketWebsite:
    content: .
    entity: website
    group: Bucket
  GetObjectAcl:
    content: .
    entity: acl
    group: Object
  GetObjectRetention:
    entity: retention
    group: Object
  GetObjectLockConfiguration:
    entity: lockconfiguration
    group: Object
  GetObjectTagging:
    entity: tagging
    group: Object
entities:
  bucket:
    columns:
    - title: Name
      content: .Name
    primary: Bucket
  object:
    columns:
    - title: Key
      content: .Key
    - title: Size
      content: .Size
    - title: LastModified
      content: .LastModified
    primary: Key
  acl:
    no_aliases: true
  cors:
    no_aliases: true
  encryption:
    no_aliases: true
  versioning:
    no_aliases: true
  location:
    no_aliases: true
  policy:
    no_aliases: true
  lifecycle:
    no_aliases: true
  website:
    no_aliases: true
  objectversion:
    no_aliases: true
  objectmetadata:
    no_aliases: true
  retention:
    no_aliases: true
  lockconfiguration:
    no_aliases: true
  tagging:
    no_aliases: true
aliases:
- entity: object
  use: describe key
  alias_to: GetObject
  aliases:
  - desc
  short: Display an object metadata, alias for api GetObject --Key key
  command:
  - api
  - GetObject
  - --Key
  - '%0'
  - --output
  - yaml
  flags:
  - name: bucket
    alias_to: Bucket
    required: true
- entity: object
  use: versions
  alias_to: ListObjectVersions
  aliases:
  - desc
  short: Display an object metadata, alias for api ListObjectVersions
  command:
  - api
  - ListObjectVersions
  - --output
  - yaml
  flags:
  - name: bucket
    alias_to: Bucket
    required: true
- entity: object
  use: download key
  alias_to: GetObject
  aliases:
  - down
  short: Download an object to the standard output, alias for api GetObject --Key key
  command:
  - api
  - GetObject
  - --Key
  - '%0'
  - --output
  - body
  flags:
  - name: bucket
    alias_to: Bucket
    required: true
- entity: bucket
  sub_command: versioning
  use: describe bucket
  alias_to: GetBucketVersioning
  aliases:
  - desc
  short: Display versioning configuration, alias for api GetBucketVersioning --Bucket bucket
  command:
  - api
  - GetBucketVersioning
  - --Bucket
  - '%0'
  - --output
  - yaml
- entity: bucket
  sub_command: versioning
  use: enable bucket
  alias_to: PutBucketVersioning
  short: Enable versioning, alias for api PutBucketVersioning --Bucket bucket --VersioningConfiguration.Status Enabled
  command:
  - api
  - PutBucketVersioning
  - --Bucket
  - '%0'
  - --VersioningConfiguration.Status
  - Enabled
  - --output
  - success
- entity: bucket
  sub_command: versioning
  use: disable bucket
  aliases:
    - del
    - rm
  alias_to: PutBucketVersioning
  short: Disable versioning, alias for api PutBucketVersioning --Bucket bucket --VersioningConfiguration.Status Suspended
  command:
  - api
  - PutBucketVersioning
  - --Bucket
  - '%0'
  - --VersioningConfiguration.Status
  - Suspended
  - --output
  - success
- entity: bucket
  sub_command: encryption
  use: describe bucket
  alias_to: GetBucketEncryption
  aliases:
  - desc
  short: Display encryption configuration, alias for api GetBucketEncryption --Bucket bucket
  command:
  - api
  - GetBucketEncryption
  - --Bucket
  - '%0'
  - --output
  - yaml
- entity: bucket
  sub_command: encryption
  use: enable bucket
  alias_to: PutBucketEncryption
  short: Enable encryption, alias for api PutBucketEncryption --Bucket bucket --ServerSideEncryptionConfiguration.Rules.0.ApplyServerSideEncryptionByDefault.SSEAlgorithm AES256
  command:
  - api
  - PutBucketEncryption
  - --Bucket
  - '%0'
  - --ServerSideEncryptionConfiguration.Rules.0.ApplyServerSideEncryptionByDefault.SSEAlgorithm
  - AES256
  - --output
  - success
- entity: bucket
  sub_command: encryption
  use: disable bucket
  aliases:
    - del
    - rm
  alias_to: DeleteBucketEncryption
  short: Disable encryption, alias for api DeleteBucketEncryption --Bucket bucket
  command:
  - api
  - DeleteBucketEncryption
  - --Bucket
  - '%0'
  - --output
  - success
- entity: bucket
  sub_command: acl
  use: describe bucket
  alias_to: GetBucketAcl
  aliases:
  - desc
  short: Display ACL configuration, alias for api GetBucketAcl --Bucket bucket
  command:
  - api
  - GetBucketAcl
  - --Bucket
  - '%0'
  - --output
  - yaml
- entity: bucket
  sub_command: acl
  use: configure bucket
  aliases:
    - config
    - cfg
  alias_to: PutBucketAcl
  short: Update ACL configuration, alias for api PutBucketAcl --Bucket bucket
  command:
  - api
  - PutBucketAcl
  - --Bucket
  - '%0'
  - --template-root
  - AccessControlPolicy
  - --output
  - success
  flags:
  - name: from-file
    alias_to: template
    usage: 'the file storing the ACL config in JSON format (i.e. {"Grants":[...]})'
  - name: acl
    alias_to: ACL
  - name: grant-full-control
    alias_to: GrantFullControl
  - name: grant-read
    alias_to: GrantRead
  - name: GrantReadACP
    alias_to: grant-read-acp
  - name: grant-write
    alias_to: GrantWrite
  - name: grant-write-acp
    alias_to: GrantWriteACP
- entity: bucket
  sub_command: cors
  use: describe bucket
  alias_to: GetBucketCors
  aliases:
  - desc
  short: Display CORS configuration, alias for api GetBucketCors --Bucket bucket
  command:
  - api
